<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Personal Sunrise • Smooth Awake Anytime</title>
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@sulfajs/sulfajs@1.0.5/build/sulfa.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <div id="menu">
            <div id="center">
                <img id="logo" src="logo.svg" alt="Personal Sunrise">
                <h1>Welcome.</h1>

                <p id="description">Your screen will slowly start turning brighter during last 20 minutes of your
                    sleeptime.</p>

                <div id="menu-section">
                    <p class="menu-section-title">Awake time</p>
                    <div id="times"></div>
                </div>

                <div id="menu-section">
                    <p class="menu-section-title">Rising star</p>
                    <div id="stars"></div>
                </div>

                <button id="start">Schedule your personal sunrise</button>
            </div>
        </div>
    </div>
    <div id="sunrise">
        <button id="exit">Press here to cancel the sunrise</button>
    </div>

    <script src="script.js"></script>
</body>

</html>
